<!-- slide-turing-video.html -->
<div class="slide">
    <div class="slide-content">
        <h2>Testing Intelligence</h2>
        <div class="slide-body">

            <!-- ── Left col : Turing Test ─────────────────────────────── -->
            <div class="q-col" style="display:flex;flex-direction:column;gap:0.8rem;">
                <div class="highlight-box" style="margin:0;flex-shrink:0;">
                    <strong>Turing Test</strong> (1950)<br>
                    Can a machine pass as human in conversation?<br>
                    <em style="color:var(--text-secondary);font-size:0.85rem;">First attempt: ELIZA, 1965</em>
                </div>

                <!-- Media frame 3D — warm orange glow -->
                <div style="
                    flex:1;min-height:0;position:relative;
                    border-radius:18px;
                    padding:8px;
                    background:linear-gradient(160deg,rgba(214,117,86,0.12) 0%,rgba(255,255,255,0.05) 50%,transparent 100%);
                    backdrop-filter:blur(22px) saturate(160%);
                    -webkit-backdrop-filter:blur(22px) saturate(160%);
                    border:1px solid rgba(214,117,86,0.28);
                    border-top-color:rgba(255,200,170,0.38);
                    transform:perspective(900px) rotateX(1deg) rotateY(1.5deg);
                    transform-origin:center bottom;
                    box-shadow:
                        inset 0 1px 0 rgba(255,220,190,0.22),
                        0 2px 4px rgba(0,0,0,0.35),
                        0 8px 18px rgba(0,0,0,0.4),
                        0 22px 48px rgba(0,0,0,0.52),
                        0 40px 80px rgba(0,0,0,0.32),
                        0 0 40px rgba(214,117,86,0.15);
                ">
                    <!-- inner subtle glow ring -->
                    <div style="
                        position:absolute;inset:0;border-radius:18px;pointer-events:none;
                        box-shadow:inset 0 0 28px rgba(214,117,86,0.1);
                        z-index:1;
                    "></div>
                    <img src="Turing_test.avif"
                         style="
                            display:block;width:100%;height:100%;
                            object-fit:contain;border-radius:12px;
                            box-shadow:0 4px 14px rgba(0,0,0,0.45);
                            position:relative;z-index:0;
                         "
                         alt="Turing Test diagram" />
                </div>
            </div>

            <!-- ── Right col : ARC Benchmark ─────────────────────────── -->
            <div class="q-col" style="display:flex;flex-direction:column;gap:0.8rem;">
                <div class="highlight-box" style="margin:0;flex-shrink:0;">
                    <strong>ARC Benchmark</strong><br>
                    <span style="font-size:0.9rem;color:var(--text-body);">Pattern-based abstract reasoning — tests general intelligence.</span>
                </div>

                <!-- Media frame 3D — cool blue glow -->
                <div style="
                    flex:1;min-height:0;position:relative;
                    border-radius:18px;
                    padding:8px;
                    background:linear-gradient(160deg,rgba(96,165,250,0.1) 0%,rgba(255,255,255,0.04) 50%,transparent 100%);
                    backdrop-filter:blur(22px) saturate(160%);
                    -webkit-backdrop-filter:blur(22px) saturate(160%);
                    border:1px solid rgba(96,165,250,0.22);
                    border-top-color:rgba(180,215,255,0.32);
                    transform:perspective(900px) rotateX(1deg) rotateY(-1.5deg);
                    transform-origin:center bottom;
                    box-shadow:
                        inset 0 1px 0 rgba(180,215,255,0.18),
                        0 2px 4px rgba(0,0,0,0.35),
                        0 8px 18px rgba(0,0,0,0.4),
                        0 22px 48px rgba(0,0,0,0.52),
                        0 40px 80px rgba(0,0,0,0.32),
                        0 0 40px rgba(96,165,250,0.12);
                ">
                    <!-- inner subtle glow ring -->
                    <div style="
                        position:absolute;inset:0;border-radius:18px;pointer-events:none;
                        box-shadow:inset 0 0 28px rgba(96,165,250,0.08);
                        z-index:1;
                    "></div>
                    <video src="turing-demo.mp4" controls preload="auto" playsinline loop data-autoplay
                           style="
                              display:block;width:100%;height:100%;
                              border-radius:12px;background:#000;
                              box-shadow:0 4px 14px rgba(0,0,0,0.45);
                              position:relative;z-index:0;
                           "></video>
                </div>
            </div>

        </div>
    </div>
</div>
