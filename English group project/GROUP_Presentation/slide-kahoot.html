<!-- slide-kahoot.html -->
<style>
    /* ── Layout principal ── */
    .kahoot-slide-body {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5rem;
        height: 100%;
    }

    /* ── Colonne gauche : QR code ── */
    .kahoot-left {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        flex-shrink: 0;
    }

    .kahoot-qr-frame {
        background: #fff;
        border-radius: 18px;
        padding: 14px;
        box-shadow: 0 0 0 1px rgba(255,255,255,0.12),
                    0 12px 40px rgba(0,0,0,0.45),
                    0 0 0 4px rgba(70,190,80,0.18);
    }

    .kahoot-qr-frame img {
        display: block;
        border-radius: 8px;
    }

    .kahoot-qr-label {
        font-size: 0.8rem;
        color: var(--text-secondary);
        text-align: center;
        line-height: 1.6;
    }

    .kahoot-qr-label strong {
        color: var(--text-primary);
        font-size: 0.88rem;
    }

    /* ── Colonne droite ── */
    .kahoot-right {
        display: flex;
        flex-direction: column;
        gap: 1.3rem;
        max-width: 400px;
    }

    .kahoot-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: rgba(70,190,80,0.12);
        border: 1px solid rgba(70,190,80,0.3);
        color: #6ee7b7;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 0.28rem 0.75rem;
        border-radius: 999px;
        width: fit-content;
    }

    .kahoot-badge::before {
        content: '';
        width: 6px; height: 6px;
        border-radius: 50%;
        background: #6ee7b7;
        box-shadow: 0 0 8px #6ee7b7;
        animation: k-blink 1.6s ease-in-out infinite;
    }

    @keyframes k-blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.2; }
    }

    .kahoot-title {
        font-size: 2.8rem;
        font-weight: 800;
        line-height: 1.1;
        color: var(--text-primary);
        margin: 0;
    }

    .kahoot-title .k-accent { color: #46be50; }

    .kahoot-steps {
        display: flex;
        flex-direction: column;
        gap: 0.55rem;
        margin: 0; padding: 0;
    }

    .kahoot-step {
        display: flex;
        align-items: flex-start;
        gap: 0.75rem;
        font-size: 0.88rem;
        color: var(--text-secondary);
        line-height: 1.5;
    }

    .kahoot-step-num {
        flex-shrink: 0;
        width: 22px; height: 22px;
        border-radius: 50%;
        background: rgba(70,190,80,0.15);
        border: 1px solid rgba(70,190,80,0.3);
        color: #6ee7b7;
        font-size: 0.7rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 0.05rem;
    }

    .kahoot-step strong { color: var(--text-primary); }

    .kahoot-launch-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.65rem;
        background: linear-gradient(135deg, #46be50 0%, #2d9e38 100%);
        color: #fff;
        font-size: 1rem;
        font-weight: 800;
        padding: 0.9rem 2rem;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        width: fit-content;
        box-shadow: 0 4px 20px rgba(70,190,80,0.35),
                    inset 0 1px 0 rgba(255,255,255,0.2);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        font-family: var(--font-family);
        letter-spacing: 0.01em;
    }

    .kahoot-launch-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(70,190,80,0.5),
                    inset 0 1px 0 rgba(255,255,255,0.2);
    }

    .kahoot-launch-btn:active {
        transform: translateY(1px);
        box-shadow: 0 2px 10px rgba(70,190,80,0.3);
    }

    .kahoot-launch-btn svg {
        width: 16px; height: 16px;
        flex-shrink: 0;
    }

    /* ══════════════════════════════════════════════
       OVERLAY — position: fixed sur document.body
       échapppe au transform: scale() de la slide
    ══════════════════════════════════════════════ */
    #kahoot-overlay {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: rgba(0, 0, 0, 0.85);
        display: flex;
        align-items: center;
        justify-content: center;
        /* annule tout héritage de transform */
        transform: none;
    }

    #kahoot-overlay-box {
        width: 92vw;
        height: 88vh;
        display: flex;
        flex-direction: column;
        border-radius: 18px;
        overflow: hidden;
        background: #0d1117;
        box-shadow: 0 32px 80px rgba(0,0,0,0.75),
                    0 0 0 1px rgba(255,255,255,0.08);
    }

    #kahoot-overlay-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.6rem 1rem;
        background: rgba(255,255,255,0.04);
        border-bottom: 1px solid rgba(255,255,255,0.07);
        flex-shrink: 0;
    }

    #kahoot-overlay-bar .k-bar-title {
        font-size: 0.8rem;
        color: rgba(255,255,255,0.5);
        font-family: var(--font-family, sans-serif);
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    #kahoot-overlay-bar .k-bar-title::before {
        content: '';
        display: inline-block;
        width: 8px; height: 8px;
        border-radius: 50%;
        background: #46be50;
        box-shadow: 0 0 6px #46be50;
    }

    #kahoot-close {
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.1);
        color: rgba(255,255,255,0.6);
        width: 30px; height: 30px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s, color 0.15s;
        line-height: 1;
        font-family: var(--font-family, sans-serif);
    }

    #kahoot-close:hover {
        background: rgba(240,60,60,0.2);
        border-color: rgba(240,60,60,0.35);
        color: #fff;
    }

    #kahoot-iframe-wrap {
        flex: 1;
        overflow: hidden;
        position: relative;
    }

    #kahoot-iframe-wrap iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
    }

    /* Fallback affiché si iframe bloqué */
    #kahoot-fallback {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.2rem;
        height: 100%;
        color: rgba(255,255,255,0.65);
        font-family: var(--font-family, sans-serif);
        text-align: center;
        padding: 2rem;
    }

    #kahoot-fallback p {
        margin: 0;
        font-size: 0.9rem;
        line-height: 1.7;
        max-width: 380px;
    }

    #kahoot-fallback .k-fallback-icon {
        font-size: 2.5rem;
        opacity: 0.5;
    }

    #kahoot-fallback a {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: linear-gradient(135deg, #46be50 0%, #2d9e38 100%);
        color: #fff;
        font-size: 0.9rem;
        font-weight: 700;
        padding: 0.7rem 1.5rem;
        border-radius: 10px;
        text-decoration: none;
        box-shadow: 0 4px 16px rgba(70,190,80,0.3);
        transition: transform 0.15s, box-shadow 0.15s;
    }

    #kahoot-fallback a:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(70,190,80,0.45);
    }
</style>

<div class="slide">
    <div class="slide-content">
        <div class="kahoot-slide-body">

            <!-- QR code — pointe vers kahoot.it -->
            <div class="kahoot-left">
                <div class="kahoot-qr-frame">
                    <img id="kahoot-qr-img" src="" alt="QR Code kahoot.it" width="210" height="210">
                </div>
                <p class="kahoot-qr-label">
                    Scan to open <strong>kahoot.it</strong><br>
                    then enter the PIN
                </p>
            </div>

            <!-- Titre + étapes + bouton -->
            <div class="kahoot-right">
                <span class="kahoot-badge">Interactive Quiz</span>

                <h2 class="kahoot-title">
                    Kahoot<br>
                    <span class="k-accent">Time!</span>
                </h2>

                <ol class="kahoot-steps">
                    <li class="kahoot-step">
                        <span class="kahoot-step-num">1</span>
                        <span>Scan the QR code or go to <strong>kahoot.it</strong></span>
                    </li>
                    <li class="kahoot-step">
                        <span class="kahoot-step-num">2</span>
                        <span>Click <strong>Launch</strong> — the game PIN appears</span>
                    </li>
                    <li class="kahoot-step">
                        <span class="kahoot-step-num">3</span>
                        <span>Enter the PIN on <strong>kahoot.it</strong> and join!</span>
                    </li>
                </ol>

                <button class="kahoot-launch-btn" onclick="kahootOpenOverlay()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 3 19 12 5 21 5 3"/>
                    </svg>
                    Launch Kahoot
                </button>
            </div>

        </div>
    </div>
</div>

<script>
    // ─── CONFIGURATION ──────────────────────────────────────────────────────────
    // URL affichée DANS l'overlay (page de saisie du PIN pour les participants)
    var KAHOOT_OVERLAY_URL = 'https://kahoot.it';

    // URL de la page hôte (ouverte en nouvel onglet si l'overlay échoue)
    var KAHOOT_HOST_URL = 'https://create.kahoot.it/share/representation-of-intelligent-robots-in-science-fiction/bd76b369-3656-4b05-bab6-3a99c1480c48';
    // ────────────────────────────────────────────────────────────────────────────

    // QR code → kahoot.it
    (function () {
        var img = document.getElementById('kahoot-qr-img');
        if (img && !img.getAttribute('src')) {
            img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=210x210&data=' + encodeURIComponent(KAHOOT_OVERLAY_URL);
        }
    })();

    function kahootOpenOverlay() {
        // Enlève un éventuel overlay précédent
        var old = document.getElementById('kahoot-overlay');
        if (old) old.remove();

        // Crée l'overlay dans document.body (hors du canvas slidé)
        var overlay = document.createElement('div');
        overlay.id = 'kahoot-overlay';

        overlay.innerHTML = [
            '<div id="kahoot-overlay-box">',
                '<div id="kahoot-overlay-bar">',
                    '<span class="k-bar-title">kahoot.it — Join the game</span>',
                    '<button id="kahoot-close" title="Close (Esc)">✕</button>',
                '</div>',
                '<div id="kahoot-iframe-wrap">',
                    '<iframe',
                    '  id="kahoot-iframe"',
                    '  src="' + KAHOOT_OVERLAY_URL + '"',
                    '  allow="autoplay; fullscreen"',
                    '  sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation"',
                    '></iframe>',
                    '<div id="kahoot-fallback">',
                        '<span class="k-fallback-icon">⚠️</span>',
                        '<p>Kahoot cannot load inside the presentation.<br>',
                        'Open it directly in a new tab:</p>',
                        '<a href="' + KAHOOT_HOST_URL + '" target="_blank" rel="noopener">↗ Open Kahoot</a>',
                    '</div>',
                '</div>',
            '</div>'
        ].join('');

        document.body.appendChild(overlay);

        // Bouton fermer
        document.getElementById('kahoot-close').addEventListener('click', kahootCloseOverlay);

        // Clic backdrop = fermer
        overlay.addEventListener('click', function (e) {
            if (e.target === overlay) kahootCloseOverlay();
        });

        // Touche Échap = fermer
        document.addEventListener('keydown', kahootEscHandler);

        // Détection de blocage iframe :
        // Si après 6s l'iframe n'a pas déclenché 'load', ou si la page est vide → fallback
        var loaded = false;
        var iframe = document.getElementById('kahoot-iframe');

        iframe.addEventListener('load', function () {
            loaded = true;
            // Tente de détecter une page blanche (bloquée mais silencieuse)
            try {
                var doc = iframe.contentDocument || (iframe.contentWindow && iframe.contentWindow.document);
                if (doc && doc.body && doc.body.innerHTML.trim() === '') {
                    kahootShowFallback();
                }
            } catch (e) {
                // Erreur cross-origin = page chargée normalement ✓
            }
        });

        iframe.addEventListener('error', function () {
            kahootShowFallback();
        });

        setTimeout(function () {
            if (!loaded) kahootShowFallback();
        }, 6000);
    }

    function kahootShowFallback() {
        var wrap = document.getElementById('kahoot-iframe-wrap');
        if (!wrap) return;
        var iframe = document.getElementById('kahoot-iframe');
        var fallback = document.getElementById('kahoot-fallback');
        if (iframe) iframe.style.display = 'none';
        if (fallback) fallback.style.display = 'flex';
    }

    function kahootCloseOverlay() {
        var overlay = document.getElementById('kahoot-overlay');
        if (overlay) overlay.remove();
        document.removeEventListener('keydown', kahootEscHandler);
    }

    function kahootEscHandler(e) {
        if (e.key === 'Escape') kahootCloseOverlay();
    }
</script>
